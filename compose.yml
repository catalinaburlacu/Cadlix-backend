services:
  mssql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_db
    ports:
      - "1433:1433"
    environment:
      CHECK_POLICY: OFF
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${DB_SA_PASSWORD}
      

  mssql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_init
    depends_on:
      - mssql-server
    volumes:
      - ./sql-init-scripts:/usr/src/app/sql-init-scripts
    environment:
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    command:
      /opt/mssql-tools18/bin/sqlcmd -S mssql-server -U SA -P ${DB_SA_PASSWORD} -C -i /usr/src/app/sql-init-scripts/init.sql

