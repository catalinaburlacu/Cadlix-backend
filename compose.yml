services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-server
    environment:
      ACCEPT_EULA: 'Y'
      SA_PASSWORD: "your_password_here"
      MSSQL_PID: Developer

    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped
  
  backend:
    build:
      context: .
    
    image: backend:1.0
    
    container_name: dotnet-web
    environment:
      ConnectionStrings__DefaultConnection: "Server=mssql-server;Database=Cadlix;User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;"
    
    ports:
      - "8080:8080"
    
    depends_on:
      - mssql

volumes:
  mssql-data:
